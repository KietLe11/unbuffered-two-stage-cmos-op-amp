name: Op-Amp Designer CI

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    # 1. Premade Action for Black (Formatting)
    # Will fail the check if your code isn't formatted to PEP 8 standards.
    - name: Check Code Formatting (Black)
      uses: psf/black@stable
      with:
        options: "--check"

    # 2. Premade Action for Ruff (Linting)
    # This officially supported action automatically creates inline comments
    # on your Pull Request for any syntax errors, unused variables, etc.
    - name: Lint Python Code (Ruff)
      uses: astral-sh/ruff-action@v3

    # 3. Setup Dependencies for Testing
    - name: Install Test Dependencies
      run: |
        python -m pip install --upgrade pip
        # We add a special pytest plugin here that translates test failures into GitHub comments
        pip install pyyaml pytest pytest-github-actions-annotate-failures

    # 4. Run Pytest
    # If a math calculation fails, the plugin will comment on the exact 'assert' line that broke.
    - name: Run Math Verification Tests
      run: pytest -v
