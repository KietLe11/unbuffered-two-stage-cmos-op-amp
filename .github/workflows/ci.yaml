name: Op-Amp Designer CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# These permissions allow the bots to leave inline comments on your PRs
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    # 1. The Formatter (Reviewdog)
    # Posts formatting suggestions directly on the changed lines in the PR
    - name: Check Code Formatting (Black)
      uses: reviewdog/action-black@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review
        black_args: "."

    # 2. The Linter (Astral)
    # Natively highlights syntax errors and unused variables in the PR
    - name: Lint Python Code (Ruff)
      uses: astral-sh/ruff-action@v3

    # 3. Setup Dependencies
    # (Ensure pytest-github-actions-annotate-failures is in your requirements.txt!)
    - name: Install Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. The Tester (Pytest)
    # The installed plugin intercepts failures and annotates the exact 'assert' line
    - name: Run Math Verification Tests
      run: pytest -v
